<!DOCTYPE html>
<html>
<head>
    <title>Hotel BMS API Logs</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #fff;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 25px;
        }

        th, td {
            padding: 8px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #000;
            color: #fff;
        }

        table tr {
            background: rgb(233, 222, 216);
            border-bottom: 2px solid #000;
        }

            table tr:nth-of-type(2n+1) {
                background: rgb(227, 214, 208);
            }

        .levelPills {
            padding: 5px;
            border-radius: 5px;
            font-weight: bold;
            margin: 10px;
            display: block;
        }

        .information {
            background: green;
            color: white;
        }

        .warning {
            background: #f93b02;
            color: black;
        }

        .error {
            background: red;
            color: white;
        }

        input, select {
            line-height: 30px;
        }

        select {
            height: 36px;
        }

        button {
            background-color: #000;
            border-radius: 40px;
            color: #fff;
            display: inline-block;
            font-size: 13px;
            padding: 10px 20px;
            transition: transform .3s ease;
            font-weight: 300;
            text-align: center;
            width: 110px;
            margin-left: 15px;
        }
    </style>
</head>
<body>

    <h2>Hotel BMS API Logs</h2>

    <p>To filter logs, use the below search options and then click the 'Filter' button.</p>

    <select id="level">
        <option value="">All</option>
        <option value="Information">Information</option>
        <option value="Warning">Warning</option>
        <option value="Error">Error</option>
    </select>

    <input type="date" id="from">
    <input type="date" id="to">
    <input type="text" id="message" style="width:280px;" placeholder="Enter text contained within a Message to filter.">

    <button onclick="loadLogs()">Filter</button>

    <table>
        <thead>
            <tr>
                <th>Time</th>
                <th>Level</th>
                <th>Message</th>
            </tr>
        </thead>
        <tbody id="logsTable"></tbody>
    </table>

    <script>

        async function loadLogs() {
            const level = document.getElementById('level').value;
            const from = document.getElementById('from').value;
            const to = document.getElementById('to').value;
            const message = document.getElementById('message').value;

            let url = `/api/logs?page=1&pageSize=50`;

            if (level) url += `&level=${level}`;
            if (from) url += `&from=${from}`;
            if (to) url += `&to=${to}`;
            if (message) url += `&message=${message}`;

            const res = await fetch(url);
            const logs = await res.json();

            const table = document.getElementById('logsTable');
            table.innerHTML = '';

            logs.forEach(log => {
                const row = document.createElement('tr');

                row.innerHTML = `
                                <td>${new Date(log.timestamp).toLocaleString()}</td>
                                <td class="${log.level.toLowerCase()} levelPills">${log.level}</td>
                                <td>${log.message}</td>
                            `;

                table.appendChild(row);
            });
        }

        loadLogs();
    </script>
</body>
</html>
